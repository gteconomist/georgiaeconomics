name: Update GA population & migration data (Census PEP)

on:
  workflow_dispatch:
  schedule:
    # Monthly on the 12th at 18:00 UTC.
    # Census PEP state totals release in Jan, county totals in Mar, and
    # state characteristics (age/sex/race) usually Jun-Sep. Monthly is
    # overkill for the data but cheap insurance against missing a refresh.
    - cron: '0 18 12 * *'
  push:
    branches: [main]
    paths:
      - 'scripts/fetch_population.py'
      - '.github/workflows/update-population.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the push step can rebase

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch GA population data
        run: |
          python scripts/fetch_population.py

      - name: Commit any updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- data/population.json; then
            git add data/population.json
            git commit -m "data: refresh GA population (Census PEP) [skip ci]"
            pushed=false
            for attempt in 1 2 3 4 5; do
              if git pull --rebase --autostash origin main && git push; then pushed=true; break; fi
              echo "push attempt $attempt rejected; rebasing and retrying..."; sleep 5
            done
            [ "$pushed" = true ] || { echo "::error::push failed after retries"; exit 1; }
          else
            echo "No data changes — nothing to commit."
          fi
