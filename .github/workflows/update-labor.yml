name: Update GA labor data (counties + statewide)

on:
  workflow_dispatch:
  schedule:
    # BLS LAUS county data drops mid-month for the prior month;
    # CES state data drops a few days earlier.
    # Run on the 25th to catch both safely.
    - cron: '0 17 25 * *'
  push:
    branches: [main]
    paths:
      - 'scripts/fetch_bls_laus.py'
      - 'scripts/fetch_labor_state.py'
      - 'scripts/_ga_counties.py'
      - '.github/workflows/update-labor.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the push step can rebase

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch BLS LAUS county-level data
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: |
          python scripts/fetch_bls_laus.py

      - name: Fetch BLS state-level labor (LAUS UR + CES sectors)
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: |
          python scripts/fetch_labor_state.py

      - name: Commit any updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          changed=0
          for f in data/counties.json data/labor.json; do
            if ! git diff --quiet -- "$f"; then
              git add "$f"
              changed=1
            fi
          done
          if [ $changed -eq 1 ]; then
            git commit -m "data: refresh GA labor (BLS LAUS counties + state, BLS CES sectors) [skip ci]"
            pushed=false
            for attempt in 1 2 3 4 5; do
              if git pull --rebase --autostash origin main && git push; then pushed=true; break; fi
              echo "push attempt $attempt rejected; rebasing and retrying..."; sleep 5
            done
            [ "$pushed" = true ] || { echo "::error::push failed after retries"; exit 1; }
          else
            echo "No data changes — nothing to commit."
          fi
