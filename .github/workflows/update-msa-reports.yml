name: Update MSA Reports

# Nightly refresh of /data/msa_reports/*.json from public APIs.
# Touches one section at a time; never blanks data on transient errors
# (failed pulls fall back to "pending" in section_status).

on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC = 04:00 ET — after the previous day's BLS release window
  workflow_dispatch:
    inputs:
      target:
        description: 'Single CBSA or short_name (leave blank for all 14)'
        required: false
        default: ''
      sections:
        description: 'Comma-separated section names (leave blank for all)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    # Backstop so a pathological run can't burn the 6-hour default. Per-section
    # SIGALRM caps in the orchestrator are the primary guard; this is belt-and-braces.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run orchestrator
        env:
          BLS_API_KEY:    ${{ secrets.BLS_API_KEY }}
          FRED_API_KEY:   ${{ secrets.FRED_API_KEY }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          BEA_API_KEY:    ${{ secrets.BEA_API_KEY }}
          ITA_API_KEY:    ${{ secrets.ITA_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          TARGET="${{ github.event.inputs.target }}"
          SECTIONS="${{ github.event.inputs.sections }}"
          ARGS=""
          if [ -z "$TARGET" ]; then ARGS="--all"; else ARGS="$TARGET"; fi
          if [ -n "$SECTIONS" ]; then ARGS="$ARGS --sections $SECTIONS"; fi
          python3 scripts/fetch_msa_report.py $ARGS

      - name: Generate report pages
        # Rebuild the static HTML pages from the freshly-fetched JSON so the
        # narrative + scorecard prose always matches the latest data. Output is
        # deterministic, so unchanged pages produce no git diff. Savannah is the
        # canonical hand-maintained template and is never regenerated.
        run: |
          TARGET="${{ github.event.inputs.target }}"
          if [ -z "$TARGET" ]; then
            python3 scripts/generate_msa_pages.py --all
          else
            LC=$(echo "$TARGET" | tr '[:upper:]' '[:lower:]')
            if [ "$LC" = "savannah" ] || [ "$LC" = "42340" ]; then
              echo "Savannah is the canonical template; skipping page generation."
            else
              python3 scripts/generate_msa_pages.py "$TARGET"
            fi
          fi
          # Refresh the 14-metro QA status matrix from the latest section_status.
          python3 scripts/build_report_status_matrix.py

      - name: Build statewide housing roll-up
        # Rolls the freshly-regenerated metro reports up into data/housing.json,
        # adds the statewide GA/US FHFA series (FRED), the all-159-county ACS
        # layer (Census), and the non-metro Georgia aggregate. Runs AFTER the
        # metro JSONs regenerate so it never reads stale data. Each section
        # degrades gracefully, so a transient API failure can't blank the page.
        env:
          FRED_API_KEY:   ${{ secrets.FRED_API_KEY }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: python3 scripts/fetch_housing.py

      - name: Build statewide GDP roll-up
        # Rolls the regenerated metro reports up into data/gdp.json, adds the
        # statewide BEA SAGDP series (real + nominal, GA + US + SE peers + sectors)
        # and the all-159-county CAGDP2 layer + non-metro aggregate. Runs AFTER
        # the metro JSONs regenerate; each section degrades gracefully.
        env:
          BEA_API_KEY: ${{ secrets.BEA_API_KEY }}
        run: python3 scripts/fetch_gdp.py

      - name: Build statewide migration roll-up
        # Rolls up the metro reports + data/population.json into data/migration.json
        # and pulls the GA statewide IRS SOI state-to-state flows. Local sections
        # (components, 159-county map, non-metro) need no key; only the SOI flow
        # pull hits the network and degrades gracefully on failure.
        run: python3 scripts/fetch_migration.py

      - name: Commit refreshed JSON + pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/msa_reports/ msa/ data/ga_msa_counties.json data/housing.json data/gdp.json data/migration.json REPORT_STATUS_MATRIX.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(msa-reports): nightly data + page refresh $(date -u +%F)"
            git push
          fi
