name: Update MSA Reports

# Nightly refresh of /data/msa_reports/*.json from public APIs.
# Touches one section at a time; never blanks data on transient errors
# (failed pulls fall back to "pending" in section_status).

on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC = 04:00 ET — after the previous day's BLS release window
  workflow_dispatch:
    inputs:
      target:
        description: 'Single CBSA or short_name (leave blank for all 14)'
        required: false
        default: ''
      sections:
        description: 'Comma-separated section names (leave blank for all)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    # Backstop so a pathological run can't burn the 6-hour default. Per-section
    # SIGALRM caps in the orchestrator are the primary guard; this is belt-and-braces.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the commit step can rebase before pushing

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run orchestrator
        env:
          BLS_API_KEY:    ${{ secrets.BLS_API_KEY }}
          FRED_API_KEY:   ${{ secrets.FRED_API_KEY }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          BEA_API_KEY:    ${{ secrets.BEA_API_KEY }}
          ITA_API_KEY:    ${{ secrets.ITA_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          TARGET="${{ github.event.inputs.target }}"
          SECTIONS="${{ github.event.inputs.sections }}"
          ARGS=""
          if [ -z "$TARGET" ]; then ARGS="--all"; else ARGS="$TARGET"; fi
          if [ -n "$SECTIONS" ]; then ARGS="$ARGS --sections $SECTIONS"; fi
          python3 scripts/fetch_msa_report.py $ARGS

      - name: Generate report pages
        # Rebuild the static HTML pages from the freshly-fetched JSON so the
        # narrative + scorecard prose always matches the latest data. Output is
        # deterministic, so unchanged pages produce no git diff. Savannah is the
        # canonical hand-maintained template and is never regenerated.
        run: |
          TARGET="${{ github.event.inputs.target }}"
          if [ -z "$TARGET" ]; then
            python3 scripts/generate_msa_pages.py --all
          else
            LC=$(echo "$TARGET" | tr '[:upper:]' '[:lower:]')
            if [ "$LC" = "savannah" ] || [ "$LC" = "42340" ]; then
              echo "Savannah is the canonical template; skipping page generation."
            else
              python3 scripts/generate_msa_pages.py "$TARGET"
            fi
          fi
          # Refresh the 14-metro QA status matrix from the latest section_status.
          python3 scripts/build_report_status_matrix.py

      - name: Build statewide housing roll-up
        # Rolls the freshly-regenerated metro reports up into data/housing.json,
        # adds the statewide GA/US FHFA series (FRED), the all-159-county ACS
        # layer (Census), and the non-metro Georgia aggregate. Runs AFTER the
        # metro JSONs regenerate so it never reads stale data. Each section
        # degrades gracefully, so a transient API failure can't blank the page.
        env:
          FRED_API_KEY:   ${{ secrets.FRED_API_KEY }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: python3 scripts/fetch_housing.py

      - name: Build statewide GDP roll-up
        # Rolls the regenerated metro reports up into data/gdp.json, adds the
        # statewide BEA SAGDP series (real + nominal, GA + US + SE peers + sectors)
        # and the all-159-county CAGDP2 layer + non-metro aggregate. Runs AFTER
        # the metro JSONs regenerate; each section degrades gracefully.
        env:
          BEA_API_KEY: ${{ secrets.BEA_API_KEY }}
        run: python3 scripts/fetch_gdp.py

      - name: Build statewide migration roll-up
        # Rolls up the metro reports + data/population.json into data/migration.json
        # and pulls the GA statewide IRS SOI state-to-state flows. Local sections
        # (components, 159-county map, non-metro) need no key; only the SOI flow
        # pull hits the network and degrades gracefully on failure.
        run: python3 scripts/fetch_migration.py

      - name: Build economic outlook (cycle + forecast)
        # Computes the statewide business-cycle index + 5-year forecast by feeding
        # GA actuals (labor/gdp/population/housing JSON) into the same modeling
        # helpers the metros use, and rolls up the 14 reports. Runs AFTER the GDP
        # and housing steps so ga_gdp / ga_hpi exist as forecast inputs. No keys.
        run: python3 scripts/fetch_forecasts.py

      - name: Broaden cross-metro comparator (Phase 4 WS4)
        # Roll the ~22 scalar metrics each metro report already computes into
        # data/msa.json (+ metric catalog & themes) so the /msa/ comparator covers
        # every indicator, not just the 6 live-pulled ones. Local read, no keys;
        # the 6 live metrics (pulled by update-msa.yml) are left untouched.
        run: python3 scripts/fetch_msa_metrics.py --rollup

      - name: Build statewide labor roll-up (Phase 4 WS3)
        # Refreshes ONLY the metro-comparison + sector-diffusion blocks in
        # data/labor.json from the freshly-regenerated metro reports (local read,
        # no BLS key). Preserves the live state UR/payrolls/sector series, which
        # the full monthly pull in update-labor.yml owns. Degrades gracefully.
        run: python3 scripts/fetch_labor_state.py --rollup

      - name: Build county metrics layer (counties map extra metrics)
        # Roll the freshly-refreshed county layers (housing ACS income/value/poverty,
        # population PEP change/net-migration, BEA county GDP) into
        # data/county_metrics.json so the /counties/ map can shade by metrics beyond
        # the animated LAUS unemployment series. Local read, no keys; a metric is
        # only emitted once its source layer has enough county coverage.
        run: python3 scripts/build_county_metrics.py

      - name: Generate county profiles (Phase 5 WS4)
        # Build all 159 /counties/<slug>/ pages from the freshly-refreshed JSON
        # (population/labor/gdp/housing). Runs AFTER the gdp + housing roll-ups so
        # it bakes current values; also fills the A–Z list on /counties/ and writes
        # data/county_index.json for the clickable county map. Deterministic output.
        run: python3 scripts/generate_county_pages.py

      - name: Stamp shared chrome (Phase 5 WS1)
        # Inject the shared head/header/footer partials into every freshly
        # regenerated page (metros + counties) via their GEN markers. Idempotent.
        run: python3 scripts/build_site.py

      - name: Rebuild client-side search index (Phase 5 WS2)
        # Regenerate data/search-index.json (static pages + 14 metros + 159 county
        # profiles) so the header search stays in sync. Deterministic output.
        run: python3 scripts/build_search_index.py

      - name: Rebuild home scorecard (Phase 5 WS5)
        # Roll the freshly-refreshed topic KPIs into data/scorecard.json for the
        # home-page "Economy at a glance" strip. Deterministic output.
        run: python3 scripts/build_scorecard.py

      - name: Commit refreshed JSON + pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/msa_reports/ data/cache/ msa/ counties/ data/ga_msa_counties.json data/msa.json data/housing.json data/gdp.json data/migration.json data/outlook.json data/labor.json data/county_metrics.json data/search-index.json data/county_index.json data/scorecard.json REPORT_STATUS_MATRIX.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(msa-reports): nightly data + page refresh $(date -u +%F)"
          # This run can take several minutes, so the remote may have advanced
          # (a manual push, or an overlapping run). Rebase onto the latest main
          # and retry the push a few times before failing the job.
          pushed=false
          for attempt in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push; then
              pushed=true; break
            fi
            echo "push attempt $attempt rejected; rebasing onto latest main and retrying..."
            sleep 5
          done
          if [ "$pushed" != true ]; then
            echo "::error::could not push refreshed data after 5 rebase+push attempts"
            exit 1
          fi
