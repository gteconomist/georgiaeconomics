name: Update GA inflation data (BLS CPI + APU)

on:
  workflow_dispatch:
  schedule:
    # Monthly on the 15th at 18:00 UTC.
    # BLS releases the headline CPI report mid-month (typically the 2nd
    # Tuesday or Wednesday) covering the prior month. The 15th gives us a
    # safe buffer to be sure the new release is up on the public API.
    - cron: '0 18 15 * *'
  push:
    branches: [main]
    paths:
      - 'scripts/fetch_inflation.py'
      - '.github/workflows/update-inflation.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the push step can rebase

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch GA inflation data
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: |
          python scripts/fetch_inflation.py

      - name: Commit any updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- data/inflation.json; then
            git add data/inflation.json
            git commit -m "data: refresh GA inflation (BLS CPI + APU) [skip ci]"
            pushed=false
            for attempt in 1 2 3 4 5; do
              if git pull --rebase --autostash origin main && git push; then pushed=true; break; fi
              echo "push attempt $attempt rejected; rebasing and retrying..."; sleep 5
            done
            [ "$pushed" = true ] || { echo "::error::push failed after retries"; exit 1; }
          else
            echo "No data changes — nothing to commit."
          fi
