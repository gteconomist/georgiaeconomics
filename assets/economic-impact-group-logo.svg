<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140" role="img" aria-label="Economic Impact Group">
  <title>Economic Impact Group</title>
  <!--
    Three ascending bar-chart clusters in three shades of gray,
    above a black bar containing the wordmark in orange.
    Built to scale at any size; uses currentColor for nothing
    (palette is locked to match the printed brand mark).
  -->

  <!-- Cluster 1 — light gray -->
  <g fill="#c7c8ca">
    <rect x="10"  y="68"  width="14" height="22"/>
    <rect x="28"  y="56"  width="14" height="34"/>
    <rect x="46"  y="40"  width="14" height="50"/>
    <rect x="64"  y="22"  width="14" height="68"/>
  </g>

  <!-- Cluster 2 — medium gray -->
  <g fill="#8c8d8f">
    <rect x="96"  y="68"  width="14" height="22"/>
    <rect x="114" y="56"  width="14" height="34"/>
    <rect x="132" y="40"  width="14" height="50"/>
    <rect x="150" y="22"  width="14" height="68"/>
  </g>

  <!-- Cluster 3 — dark gray -->
  <g fill="#4a4b4d">
    <rect x="182" y="68"  width="14" height="22"/>
    <rect x="200" y="56"  width="14" height="34"/>
    <rect x="218" y="40"  width="14" height="50"/>
    <rect x="236" y="22"  width="14" height="68"/>
  </g>

  <!-- Black wordmark bar -->
  <rect x="0" y="98" width="400" height="34" fill="#0a0a0a"/>

  <!-- Wordmark -->
  <text x="12" y="122"
        font-family="'Source Sans Pro', 'Helvetica Neue', Arial, sans-serif"
        font-size="22"
        font-weight="700"
        letter-spacing="0.5"
        fill="#e8642a">economic impact group</text>
</svg>
